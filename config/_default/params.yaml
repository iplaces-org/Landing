# SITE SETUP
# Guide: https://docs.hugoblox.com/tutorial/
# Documentation: https://docs.hugoblox.com/
# This file is formatted using YAML syntax - learn more at https://learnxinyminutes.com/docs/yaml/

# Appearance
appearance:
  mode: light
  color: emerald

# SEO
marketing:
  seo:
    site_type: Organization
    local_business_type: ''
    org_name: 'iPlaces'
    description: 'iPlaces helps you discover, explore, and share the most amazing places around the world. Find hidden gems, plan your next adventure, and connect with fellow explorers.'
    twitter: 'iPlacesHQ'
  analytics:
    google_analytics: ''
    baidu_tongji: ''
    plausible: ''
    fathom: ''
    pirsch: ''
  verification:
    google: ''
    baidu: ''

# Site header
header:
  navbar:
    enable: true
    blox: "navbar"
    align: "center"
    fixed_to_top: true
    logo:
      text: ""
      # Logo filename in `assets/media/` folder
      filename: "logo.svg"
    button:
      enable: true
      text: "Explore Places"
      url: "/#discover"
    show_search: true
    show_theme_chooser: true

# Site footer
footer:
  copyright:
    notice: '© {year} iPlaces. All rights reserved.'

# Localization
locale:
  date_format: 'Jan 2, 2006'
  time_format: '3:04 PM'
